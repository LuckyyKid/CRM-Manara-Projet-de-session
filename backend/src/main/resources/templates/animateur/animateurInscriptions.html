<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Présences — Animateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Présence</span>
                    <h1 class="mm-page-title fs-1">Calendrier des présences</h1>
                    <p class="mm-page-subtitle">Cliquez sur une animation pour ouvrir la feuille de présence et ajouter vos notes.</p>
                </div>
                <div class="mm-page-actions">
                    <a class="btn btn-outline-primary" href="/animateur/dashboard">Retour</a>
                </div>
            </div>

            <div class="card mm-card-shadow">
                <div class="card-body">
                    <div class="mm-weekly-shell">
                        <div class="mm-weekly-toolbar">
                            <div>
                                <div class="mm-weekly-title">Semaine de travail</div>
                                <div class="mm-weekly-range"
                                     th:text="${#temporals.format(weekStart, 'd MMMM') + ' au ' + #temporals.format(weekEnd, 'd MMMM yyyy')}">Semaine</div>
                            </div>
                            <div class="mm-weekly-nav">
                                <a class="btn btn-outline-secondary btn-sm"
                                   th:href="@{/animateur/inscriptions(date=${prevWeek})}">Semaine précédente</a>
                                <a class="btn btn-outline-secondary btn-sm"
                                   th:href="@{/animateur/inscriptions(date=${nextWeek})}">Semaine suivante</a>
                            </div>
                        </div>

                        <div class="mm-schedule">
                            <div class="mm-schedule-head">
                                <div class="mm-schedule-corner">
                                    <i class="bi bi-clock"></i>
                                </div>
                                <th:block th:each="day : ${weekDays}">
                                    <div class="mm-schedule-dayhead">
                                        <span class="mm-schedule-dayname"
                                              th:text="${#temporals.format(day['date'], 'EEE')}">Lun</span>
                                        <span class="mm-schedule-daynum"
                                              th:text="${#temporals.format(day['date'], 'd')}">31</span>
                                    </div>
                                </th:block>
                            </div>

                            <div class="mm-schedule-body" th:style="'height:' + ${scheduleBodyHeight} + 'px;'">
                                <div class="mm-schedule-times">
                                    <div th:each="hour : ${scheduleHours}" class="mm-schedule-time"
                                         th:text="${hour}">08:00</div>
                                </div>

                                <th:block th:each="day : ${weekDays}">
                                    <div class="mm-schedule-column">
                                        <div th:if="${#lists.isEmpty(day['blocks'])}" class="mm-schedule-empty">
                                            Aucun cours
                                        </div>
                                        <th:block th:each="block : ${day['blocks']}">
                                            <a class="mm-schedule-event"
                                               th:classappend="${block['variant'] == 'secondary'} ? ' mm-schedule-event-secondary' : ''"
                                               th:href="${block['url']}"
                                               th:style="'top:' + ${block['top']} + 'px; height:' + ${block['height']} + 'px;'">
                                                <div class="mm-schedule-event-child">Feuille de présence</div>
                                                <div class="mm-schedule-event-title" th:text="${block['title']}">Activité</div>
                                                <div class="mm-schedule-event-time" th:text="${block['time']}">09:00 - 10:30</div>
                                            </a>
                                        </th:block>
                                    </div>
                                </th:block>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
