<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Fragment du chatbot - à inclure dans les pages -->
<div th:fragment="chatbot">
    <style>
        .chatbot-toggle {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            z-index: 1100;
            width: 4rem;
            height: 4rem;
            border: 0;
            border-radius: 1.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a66ff 0%, #57a8ff 100%);
            color: #fff;
            font-size: 1.3rem;
            box-shadow: 0 20px 50px -18px rgba(10, 102, 255, 0.42);
        }

        .chatbot-badge {
            position: absolute;
            top: -0.3rem;
            right: -0.2rem;
            min-width: 1.35rem;
            height: 1.35rem;
            padding: 0 0.35rem;
            border-radius: 999px;
            background: #ba1a1a;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            line-height: 1.35rem;
            text-align: center;
        }

        .chatbot-window {
            position: fixed;
            right: 1.5rem;
            bottom: 6.2rem;
            z-index: 1100;
            width: min(24rem, calc(100vw - 2rem));
            height: min(38rem, calc(100vh - 8rem));
            flex-direction: column;
            overflow: hidden;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 60px -24px rgba(25, 28, 29, 0.35);
        }

        .chatbot-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.1rem;
            background: linear-gradient(135deg, #0a66ff 0%, #57a8ff 100%);
            color: #fff;
        }

        .chatbot-header-info {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            min-width: 0;
        }

        .chatbot-avatar,
        .bot-avatar {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chatbot-avatar {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .bot-avatar {
            background: rgba(10, 102, 255, 0.12);
            color: #0a66ff;
        }

        .chatbot-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .chatbot-status {
            color: rgba(255, 255, 255, 0.86);
            font-size: 0.76rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.2rem;
        }

        .status-dot {
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 999px;
            background: #d6e9ff;
            box-shadow: 0 0 0 4px rgba(198, 255, 212, 0.16);
        }

        .chatbot-close,
        .chatbot-send,
        .suggestion-btn {
            border: 0;
            font-family: inherit;
        }

        .chatbot-close {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 0.8rem;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(248, 249, 250, 0.78);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .chatbot-message {
            display: flex;
            gap: 0.65rem;
            align-items: flex-end;
        }

        .chatbot-message .message-content {
            max-width: 85%;
            padding: 0.85rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #191c1d;
            background: #fff;
            box-shadow: 0 12px 24px -22px rgba(25, 28, 29, 0.5);
        }

        .chatbot-message.user-message {
            justify-content: flex-end;
        }

        .chatbot-message.user-message .message-content {
            background: linear-gradient(135deg, #0a66ff 0%, #57a8ff 100%);
            color: #fff;
            border-bottom-right-radius: 0.35rem;
        }

        .chatbot-message.bot-message .message-content {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-left-radius: 0.35rem;
        }

        .chatbot-suggestions {
            display: none;
            flex-wrap: wrap;
            gap: 0.55rem;
            padding: 0.85rem 1rem 0;
            background: rgba(248, 249, 250, 0.78);
        }

        .suggestion-btn {
            padding: 0.5rem 0.75rem;
            border-radius: 999px;
            background: rgba(10, 102, 255, 0.09);
            color: #0a66ff;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .chatbot-input-area {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.92);
        }

        .chatbot-input {
            flex: 1;
            min-width: 0;
            border: 1px solid rgba(188, 203, 185, 0.45);
            border-radius: 999px;
            padding: 0.8rem 1rem;
            background: #fff;
            color: #191c1d;
            font-size: 0.9rem;
            outline: none;
            box-shadow: none;
        }

        .chatbot-input:focus {
            border-color: rgba(10, 102, 255, 0.72);
            box-shadow: 0 0 0 4px rgba(87, 168, 255, 0.18);
        }

        .chatbot-send {
            width: 2.9rem;
            height: 2.9rem;
            border-radius: 999px;
            background: linear-gradient(135deg, #0a66ff 0%, #57a8ff 100%);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .loading-dots {
            display: inline-flex;
            gap: 0.3rem;
            align-items: center;
        }

        .loading-dots span {
            width: 0.4rem;
            height: 0.4rem;
            border-radius: 999px;
            background: rgba(10, 102, 255, 0.55);
            animation: chatbot-bounce 1s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes chatbot-bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.55; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 991.98px) {
            .chatbot-toggle {
                right: 1rem;
                bottom: 1rem;
            }

            .chatbot-window {
                right: 1rem;
                bottom: 5.8rem;
                width: calc(100vw - 2rem);
                height: min(34rem, calc(100vh - 7rem));
            }
        }
    </style>
    
    <!-- Bouton flottant pour ouvrir le chat -->
    <button id="chatbot-toggle" class="chatbot-toggle" onclick="toggleChatbot()">
        <i class="bi bi-chat-dots-fill"></i>
        <span class="chatbot-badge" id="chatbot-badge" style="display: none;">!</span>
    </button>

    <!-- Fenêtre du chatbot -->
    <div id="chatbot-window" class="chatbot-window" style="display: none;">
        
        <!-- Header du chat -->
        <div class="chatbot-header">
            <div class="chatbot-header-info">
                <div class="chatbot-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div>
                    <div class="chatbot-title">Assistant Manara</div>
                    <div class="chatbot-status">
                        <span class="status-dot"></span> En ligne
                    </div>
                </div>
            </div>
            <button class="chatbot-close" onclick="toggleChatbot()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- Zone des messages -->
        <div id="chatbot-messages" class="chatbot-messages">
            <!-- Les messages seront ajoutés ici par JavaScript -->
        </div>

        <!-- Suggestions rapides -->
        <div id="chatbot-suggestions" class="chatbot-suggestions">
            <!-- Les suggestions seront ajoutées ici -->
        </div>

        <!-- Zone de saisie -->
        <div class="chatbot-input-area">
            <input 
                type="text" 
                id="chatbot-input" 
                class="chatbot-input" 
                placeholder="Écrivez votre message..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="chatbot-send" onclick="envoyerMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>

    <!-- Script du chatbot -->
    <script>
        var chatbotOuvert = false;
        var premierOuverture = true;

        function toggleChatbot() {
            var fenetre = document.getElementById('chatbot-window');
            var badge = document.getElementById('chatbot-badge');
            
            chatbotOuvert = !chatbotOuvert;
            fenetre.style.display = chatbotOuvert ? 'flex' : 'none';
            badge.style.display = 'none';
            
            if (chatbotOuvert && premierOuverture) {
                premierOuverture = false;
                initialiserChatbot();
            }
            
            if (chatbotOuvert) {
                document.getElementById('chatbot-input').focus();
            }
        }

        function initialiserChatbot() {
            fetch('/api/chatbot/init')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.success) {
                        ajouterMessageBot(data.messageBienvenue);
                        afficherSuggestions(data.suggestions);
                    }
                })
                .catch(function(error) {
                    console.error('Erreur init:', error);
                    ajouterMessageBot("Bonjour! Comment puis-je vous aider?");
                    afficherSuggestions(["Inscriptions", "Activités", "Horaires", "Contact"]);
                });
        }

        function envoyerMessage(messageForce) {
            var input = document.getElementById('chatbot-input');
            var message = messageForce || input.value.trim();
            
            if (!message) return;
            
            ajouterMessageUtilisateur(message);
            input.value = '';
            
            document.getElementById('chatbot-suggestions').style.display = 'none';
            
            var loadingId = ajouterMessageLoading();
            
            fetch('/api/chatbot/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                supprimerMessage(loadingId);
                if (data.success) {
                    ajouterMessageBot(data.reponse);
                    if (data.suggestions && data.suggestions.length > 0) {
                        afficherSuggestions(data.suggestions);
                    }
                } else {
                    ajouterMessageBot("Désolé, une erreur s'est produite.");
                }
            })
            .catch(function(error) {
                console.error('Erreur:', error);
                supprimerMessage(loadingId);
                ajouterMessageBot("Désolé, je ne peux pas répondre pour le moment.");
                afficherSuggestions(["Réessayer", "Nous contacter"]);
            });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                envoyerMessage();
            }
        }

        function ajouterMessageUtilisateur(texte) {
            var container = document.getElementById('chatbot-messages');
            var messageDiv = document.createElement('div');
            messageDiv.className = 'chatbot-message user-message';
            messageDiv.innerHTML = '<div class="message-content">' + escapeHtml(texte) + '</div>';
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function ajouterMessageBot(texte) {
            var container = document.getElementById('chatbot-messages');
            var messageDiv = document.createElement('div');
            messageDiv.className = 'chatbot-message bot-message';
            var texteFormate = escapeHtml(texte).replace(/\n/g, '<br>');
            messageDiv.innerHTML = '<div class="bot-avatar"><i class="bi bi-robot"></i></div><div class="message-content">' + texteFormate + '</div>';
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function ajouterMessageLoading() {
            var container = document.getElementById('chatbot-messages');
            var messageDiv = document.createElement('div');
            var id = 'loading-' + Date.now();
            messageDiv.id = id;
            messageDiv.className = 'chatbot-message bot-message';
            messageDiv.innerHTML = '<div class="bot-avatar"><i class="bi bi-robot"></i></div><div class="message-content loading-dots"><span></span><span></span><span></span></div>';
            container.appendChild(messageDiv);
            scrollToBottom();
            return id;
        }

        function supprimerMessage(id) {
            var element = document.getElementById(id);
            if (element) element.remove();
        }

        function afficherSuggestions(suggestions) {
            var container = document.getElementById('chatbot-suggestions');
            container.innerHTML = '';
            container.style.display = 'flex';
            
            for (var i = 0; i < suggestions.length; i++) {
                var btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.textContent = suggestions[i];
                btn.setAttribute('data-message', suggestions[i]);
                btn.onclick = function() { 
                    envoyerMessage(this.getAttribute('data-message')); 
                };
                container.appendChild(btn);
            }
        }

        function scrollToBottom() {
            var container = document.getElementById('chatbot-messages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</div>

</body>
</html>
