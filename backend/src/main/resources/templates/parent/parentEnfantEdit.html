<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modifier un enfant — CRM Manara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card mm-card-shadow mm-form-card">
                        <div class="card-body p-4">
                            <span class="mm-page-eyebrow">Edition</span>
                            <h1 class="mm-page-title fs-2 mb-3">Modifier un enfant</h1>
                            <div id="parentEnfantFormFeedback" class="alert d-none" role="alert"></div>
                            <form th:action="@{'/parent/enfants/' + ${enfant.id} + '/edit'}" method="post" class="js-parent-enfant-form" data-mode="edit" th:attr="data-enfant-id=${enfant.id}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="mb-3">
                                    <label class="form-label">Nom</label>
                                    <input type="text" name="nom" class="form-control" th:value="${enfant.nom}" required>
                                    <div class="small text-danger mt-1" data-field-error="nom" th:text="${errors['nom']}"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Prénom</label>
                                    <input type="text" name="prenom" class="form-control" th:value="${enfant.prenom}" required>
                                    <div class="small text-danger mt-1" data-field-error="prenom" th:text="${errors['prenom']}"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Date de naissance</label>
                                    <input type="date" name="dateNaissance" class="form-control" th:value="${#dates.format(enfant.date_de_naissance, 'yyyy-MM-dd')}" required>
                                    <div class="small text-danger mt-1" data-field-error="dateNaissance" th:text="${errors['dateNaissance']}"></div>
                                </div>

                                <div class="d-flex gap-2 flex-wrap">
                                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                                    <a class="btn btn-outline-secondary" href="/parent/enfants">Annuler</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/parent-enfant-form.js}"></script>
</body>
</html>
