spring.application.name=CRM-Manara

# Runtime configuration. Real credentials stay in application-secret.properties
# or environment variables; application-secret.properties is ignored by git.
spring.config.import=optional:classpath:application-local.properties,optional:classpath:application-secret.properties,optional:classpath:application-secrets.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/manara}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.hikari.connection-init-sql=${SPRING_DATASOURCE_CONNECTION_INIT_SQL:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true

logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.CRM_Manara.CRM_Manara.service.EmailService=INFO
logging.level.CRM_Manara.CRM_Manara.service.HomeworkService=INFO
logging.level.CRM_Manara.CRM_Manara.service.ParentQuizService=INFO
logging.level.CRM_Manara.CRM_Manara.service.AnthropicHomeworkGenerationService=INFO
logging.file.name=${APP_LOG_FILE:target/runtime.log}
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{48} : %msg%n

server.port=${PORT:8080}
spring.thymeleaf.enabled=false
spring.jpa.open-in-view=false

resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
app.email.demo-copy=${DEMO_COPY_EMAIL:}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:${FRONTEND_BASE_URL:http://localhost:4200},http://localhost:4200,http://127.0.0.1:4200,https://*.vercel.app}

anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
