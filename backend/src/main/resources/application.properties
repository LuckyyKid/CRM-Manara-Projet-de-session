spring.application.name=CRM-Manara

# Security note:
# Do not commit real credentials in this file. Configure secrets with environment
# variables or an ignored local file such as application-secret.properties.
spring.config.import=optional:classpath:application-local.properties,optional:classpath:application-secret.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/manara}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.CRM_Manara.CRM_Manara.service.EmailService=INFO

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.connection-init-sql=${SPRING_DATASOURCE_CONNECTION_INIT_SQL:}

server.port=${SERVER_PORT:8080}

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
app.email.demo-copy=${DEMO_COPY_EMAIL:}

# Google OAuth credentials must be regenerated after a leak and supplied through
# environment variables:
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
