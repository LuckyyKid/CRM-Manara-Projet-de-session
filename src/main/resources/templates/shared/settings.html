<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paramètres — CRM Manara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Paramètres</span>
                    <h1 class="mm-page-title">Mon compte</h1>
                    <p class="mm-page-subtitle">Mettez à jour vos informations, votre courriel, votre mot de passe et votre photo de profil.</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12 col-lg-4">
                    <div class="card mm-card-shadow h-100">
                        <div class="card-body p-4 text-center">
                            <img id="settingsAvatarPreview"
                                 class="mm-settings-avatar"
                                 th:src="${settings.avatarUrl}"
                                 alt="Photo de profil">
                            <h2 class="mm-panel-title mt-3 mb-1" th:text="${settings.prenom + ' ' + settings.nom}">Nom</h2>
                            <p class="mm-panel-subtitle mb-0" th:text="${settings.email}">email@example.com</p>
                            <div class="mm-chip mt-3" th:text="${settings.role}">PARENT</div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-8">
                    <div class="card mm-card-shadow">
                        <div class="card-body p-4">
                            <div id="settingsFeedback" class="alert d-none" role="alert"></div>

                            <form id="settingsForm" th:attr="data-csrf-name=${_csrf.parameterName},data-csrf-token=${_csrf.token}" novalidate>
                                <div class="row g-3">
                                    <div class="col-12 col-md-6">
                                        <label class="form-label" for="settingsPrenom">Prénom</label>
                                        <input id="settingsPrenom" name="prenom" class="form-control" th:value="${settings.prenom}" required>
                                        <div class="invalid-feedback" data-error-for="prenom"></div>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label" for="settingsNom">Nom</label>
                                        <input id="settingsNom" name="nom" class="form-control" th:value="${settings.nom}" required>
                                        <div class="invalid-feedback" data-error-for="nom"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="settingsEmail">Courriel</label>
                                        <input id="settingsEmail" name="email" type="email" class="form-control" th:value="${settings.email}" required>
                                        <div class="invalid-feedback" data-error-for="email"></div>
                                    </div>
                                    <div class="col-12" th:if="${settings.role == 'PARENT'}">
                                        <label class="form-label" for="settingsAdresse">Adresse</label>
                                        <input id="settingsAdresse" name="adresse" class="form-control" th:value="${settings.adresse}">
                                        <div class="invalid-feedback" data-error-for="adresse"></div>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label" for="settingsPassword">Nouveau mot de passe</label>
                                        <input id="settingsPassword" name="newPassword" type="password" class="form-control" placeholder="Laisser vide pour conserver l'actuel">
                                        <div class="invalid-feedback" data-error-for="newPassword"></div>
                                    </div>
                                    <div class="col-12 col-md-6">
                                        <label class="form-label" for="settingsPasswordConfirm">Confirmer le mot de passe</label>
                                        <input id="settingsPasswordConfirm" name="confirmPassword" type="password" class="form-control">
                                        <div class="invalid-feedback" data-error-for="confirmPassword"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="settingsAvatarFile">Photo de profil</label>
                                        <input id="settingsAvatarFile" name="avatarFile" type="file" class="form-control" accept="image/*">
                                        <div class="invalid-feedback" data-error-for="avatarFile"></div>
                                        <div class="form-check mt-2">
                                            <input class="form-check-input" type="checkbox" value="true" id="settingsResetAvatar" name="resetAvatar">
                                            <label class="form-check-label" for="settingsResetAvatar">
                                                Revenir à la photo par défaut
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex gap-2 justify-content-end mt-4">
                                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/settings.js}"></script>
</body>
</html>
