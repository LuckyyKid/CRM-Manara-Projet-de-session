<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parents et Enfants — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Familles</span>
                    <h1 class="mm-page-title fs-1">Parents et enfants</h1>
                    <p class="mm-page-subtitle">Validez les comptes parents et activez les enfants avant leur utilisation.</p>
                </div>
                <div class="mm-page-actions">
                    <a class="btn btn-outline-primary" href="/admin/adminDashboard">Retour</a>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <span th:text="${message}"></span>
            </div>
            <div id="adminParentsFeedback" class="alert d-none" role="alert"></div>

            <div class="vstack gap-3">
                <div th:if="${#lists.isEmpty(parents)}" class="card mm-card-shadow">
                    <div class="card-body">
                        <div class="text-secondary">Aucun parent pour le moment.</div>
                    </div>
                </div>

                <div th:each="parent : ${parents}" class="card mm-card-shadow" th:attr="data-admin-parent-card=${parent.id}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                            <div>
                                <h2 class="mm-panel-title mb-1" th:text="${parent.prenom + ' ' + parent.nom}">Parent</h2>
                                <p class="mm-panel-subtitle mb-1" th:text="${parent.user != null ? parent.user.email : 'Aucun email'}">email</p>
                                <div class="small text-secondary" th:text="${parent.adresse}">adresse</div>
                            </div>
                            <div class="d-flex gap-2 flex-wrap align-items-center">
                                <span class="badge rounded-pill"
                                      th:classappend="${parent.user != null and parent.user.enabled} ? ' text-bg-success' : ' text-bg-warning'"
                                      th:text="${parent.user != null and parent.user.enabled ? 'Confirme' : 'En attente'}">Statut</span>
                                <form th:if="${parent.user != null and !parent.user.enabled}" th:action="@{'/admin/parents/' + ${parent.id} + '/status'}" method="post" class="d-inline js-admin-family-action-form"
                                      th:attr="data-action-url=@{'/admin/api/parents/' + ${parent.id} + '/status'},data-parent-id=${parent.id}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="enabled" value="true"/>
                                    <button type="submit" class="btn btn-sm btn-primary">Confirmer parent</button>
                                </form>
                                <form th:if="${parent.user != null and parent.user.enabled}" th:action="@{'/admin/parents/' + ${parent.id} + '/status'}" method="post" class="d-inline js-admin-family-action-form"
                                      th:attr="data-action-url=@{'/admin/api/parents/' + ${parent.id} + '/status'},data-parent-id=${parent.id}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="enabled" value="false"/>
                                    <button type="submit" class="btn btn-sm btn-outline-secondary">Désactiver parent</button>
                                </form>
                                <form th:action="@{'/admin/parents/' + ${parent.id} + '/delete'}" method="post" class="d-inline js-admin-family-action-form"
                                      th:attr="data-action-url=@{'/admin/api/parents/' + ${parent.id} + '/delete'},data-parent-id=${parent.id},data-delete-card='true'">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Supprimer parent</button>
                                </form>
                            </div>
                        </div>

                        <div class="table-responsive mt-3">
                            <table class="table table-sm align-middle">
                                <thead>
                                <tr>
                                    <th>Enfant</th>
                                    <th>Date de naissance</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(parent.enfants)}">
                                    <td colspan="4" class="text-secondary">Aucun enfant lié à ce parent.</td>
                                </tr>
                                <tr th:each="enfant : ${parent.enfants}" th:attr="data-admin-child-row=${enfant.id}">
                                    <td th:text="${enfant.prenom + ' ' + enfant.nom}">Enfant</td>
                                    <td>
                                        <span data-format="date"
                                              th:attr="data-value=${#dates.format(enfant.date_de_naissance, 'yyyy-MM-dd')}"></span>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${enfant.active} ? ' text-bg-success' : ' text-bg-warning'"
                                              th:text="${enfant.active ? 'Actif' : 'En attente'}">Statut</span>
                                    </td>
                                    <td>
                                        <form th:if="${!enfant.active}" th:action="@{'/admin/enfants/' + ${enfant.id} + '/status'}" method="post" class="d-inline js-admin-family-action-form"
                                              th:attr="data-action-url=@{'/admin/api/enfants/' + ${enfant.id} + '/status'},data-child-id=${enfant.id}">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="active" value="true"/>
                                            <button type="submit" class="btn btn-sm btn-primary">Approuver enfant</button>
                                        </form>
                                        <form th:if="${enfant.active}" th:action="@{'/admin/enfants/' + ${enfant.id} + '/status'}" method="post" class="d-inline js-admin-family-action-form"
                                              th:attr="data-action-url=@{'/admin/api/enfants/' + ${enfant.id} + '/status'},data-child-id=${enfant.id}">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <input type="hidden" name="active" value="false"/>
                                            <button type="submit" class="btn btn-sm btn-outline-secondary">Désactiver</button>
                                        </form>
                                        <form th:action="@{'/admin/enfants/' + ${enfant.id} + '/delete'}" method="post" class="d-inline js-admin-family-action-form"
                                              th:attr="data-action-url=@{'/admin/api/enfants/' + ${enfant.id} + '/delete'},data-child-id=${enfant.id},data-delete-row='true'">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Supprimer</button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin-family-actions.js}"></script>
</body>
</html>
