<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animateurs — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Equipe</span>
                    <h1 class="mm-page-title fs-1">Animateurs</h1>
                    <p class="mm-page-subtitle">Gérez les comptes animateurs et maintenez une équipe proprement organisée.</p>
                </div>
                <div class="mm-page-actions">
                    <a class="btn btn-primary" href="/admin/animateurs/new">Créer un animateur</a>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <span th:text="${message}"></span>
            </div>

            <div id="adminAnimateursFeedback" class="alert d-none" role="alert"></div>

            <div class="card mm-card-shadow">
                <div class="card-body">
                    <div class="mb-3">
                        <h2 class="mm-panel-title">Annuaire des animateurs</h2>
                        <p class="mm-panel-subtitle">Edition, suppression et contrôle rapide des accès.</p>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Prénom</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(animateurs)}">
                                <td colspan="3" class="text-secondary">Aucun animateur.</td>
                            </tr>
                            <tr th:each="an : ${animateurs}" th:attr="data-admin-row=${an.id}">
                                <td th:text="${an.nom}"></td>
                                <td th:text="${an.prenom}"></td>
                                <td>
                                    <a class="btn btn-sm btn-outline-secondary" th:href="@{'/admin/animateurs/' + ${an.id} + '/edit'}">Modifier</a>
                                    <form th:action="@{'/admin/animateurs/' + ${an.id} + '/delete'}" method="post" class="d-inline js-admin-delete-form" th:attr="data-delete-url=@{'/admin/api/animateurs/' + ${an.id} + '/delete'},data-row-id=${an.id},data-feedback-target='adminAnimateursFeedback',data-confirm='Supprimer cet animateur ?'">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Supprimer</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin-list-actions.js}"></script>
</body>
</html>
