<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications admin — CRM Manara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Administration</span>
                    <h1 class="mm-page-title fs-1">Notifications</h1>
                    <p class="mm-page-subtitle">Copie centralisée des notifications et actions provenant des parents et animateurs.</p>
                </div>
                <div class="mm-page-actions">
                    <a class="btn btn-outline-primary" th:href="@{/admin/adminDashboard}">Retour</a>
                </div>
            </div>

            <div class="card mm-card-shadow">
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(notifications)}" class="text-secondary">Aucune notification admin pour le moment.</div>
                    <div class="vstack gap-3" th:if="${!#lists.isEmpty(notifications)}">
                        <div th:each="notification : ${notifications}" class="border rounded-4 p-3">
                            <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                                <div>
                                    <div class="mm-page-eyebrow mb-2" th:text="${notification.source + ' • ' + notification.type}">SOURCE</div>
                                    <p class="mb-0" th:text="${notification.message}">Message</p>
                                </div>
                                <div class="text-secondary small text-end">
                                    <span data-format="datetime" th:attr="data-value=${#temporals.format(notification.createdAt, 'yyyy-MM-dd''T''HH:mm')}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
