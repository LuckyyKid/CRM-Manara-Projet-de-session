<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications — CRM Manara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Suivi parent</span>
                    <h1 class="mm-page-title fs-1">Notifications et reçus</h1>
                    <p class="mm-page-subtitle">Retrouvez ici le suivi des demandes, approbations, refus et mises à jour de votre compte.</p>
                </div>
                <div class="mm-page-actions">
                    <span class="mm-chip">Non lues: <span th:text="${unreadNotifications}">0</span></span>
                    <form th:action="@{/parent/notifications/read-all}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-primary">Tout marquer comme lu</button>
                    </form>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <span th:text="${message}"></span>
            </div>

            <div class="vstack gap-3">
                <div th:if="${#lists.isEmpty(notifications)}" class="card mm-card-shadow">
                    <div class="card-body text-secondary">
                        Aucune notification pour le moment.
                    </div>
                </div>

                <div th:each="notification : ${notifications}" class="card mm-card-shadow">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                            <div>
                                <div class="mm-page-eyebrow mb-2" th:text="${notification.category}">INSCRIPTION</div>
                                <h2 class="mm-panel-title mb-1" th:text="${notification.title}">Titre</h2>
                                <p class="mm-panel-subtitle mb-0" th:text="${notification.message}">Message</p>
                            </div>
                            <div class="text-secondary small">
                                <span data-format="datetime"
                                      th:attr="data-value=${#temporals.format(notification.createdAt, 'yyyy-MM-dd''T''HH:mm')}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
