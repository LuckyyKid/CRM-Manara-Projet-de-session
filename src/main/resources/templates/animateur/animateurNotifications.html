<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications — Animateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Suivi animateur</span>
                    <h1 class="mm-page-title fs-1">Notifications</h1>
                    <p class="mm-page-subtitle">Retrouvez les nouvelles sessions, les changements d'activité et les mises à jour d'inscriptions liées à vos animations.</p>
                </div>
                <div class="mm-page-actions">
                    <form th:action="@{/animateur/notifications/read-all}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-primary">Tout marquer comme lu</button>
                    </form>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <span th:text="${message}"></span>
            </div>

            <div class="vstack gap-3">
                <div th:if="${#lists.isEmpty(notifications)}" class="card mm-card-shadow">
                    <div class="card-body text-secondary">
                        Aucune notification pour le moment.
                    </div>
                </div>

                <div th:each="notification : ${notifications}"
                     class="card mm-card-shadow"
                     th:classappend="${!notification.readStatus} ? ' mm-notification-card-unread' : ''">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                            <div>
                                <div class="mm-page-eyebrow mb-2" th:text="${notification.category}">ANIMATION</div>
                                <h2 class="mm-panel-title mb-1" th:text="${notification.title}">Titre</h2>
                                <p class="mm-panel-subtitle mb-0" th:text="${notification.message}">Message</p>
                            </div>
                            <div class="text-secondary small text-end">
                                <div>
                                    <span data-format="datetime"
                                          th:attr="data-value=${#temporals.format(notification.createdAt, 'yyyy-MM-dd''T''HH:mm')}"></span>
                                </div>
                                <div class="d-flex gap-2 mt-3">
                                    <form th:if="${!notification.readStatus}" th:action="@{/animateur/notifications/{id}/read(id=${notification.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-primary">Marquer comme lue</button>
                                    </form>
                                    <form th:action="@{/animateur/notifications/{id}/archive(id=${notification.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-secondary">Archiver</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mm-card-shadow" th:if="${!#lists.isEmpty(archivedNotifications)}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="mm-page-eyebrow mb-1">Archives</div>
                                <h2 class="mm-panel-title mb-0">Notifications archivées</h2>
                            </div>
                            <button class="btn btn-outline-secondary btn-sm"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    data-bs-target="#archivedAnimateurNotificationsPanel"
                                    aria-expanded="false"
                                    aria-controls="archivedAnimateurNotificationsPanel">
                                Voir les archives
                            </button>
                        </div>
                        <div id="archivedAnimateurNotificationsPanel" class="collapse">
                            <div class="vstack gap-3">
                                <div th:each="notification : ${archivedNotifications}" class="border rounded-4 p-3 bg-light-subtle">
                                    <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                                        <div>
                                            <div class="mm-page-eyebrow mb-2" th:text="${notification.category}">ANIMATION</div>
                                            <h3 class="h6 mb-1" th:text="${notification.title}">Titre</h3>
                                            <p class="text-secondary mb-0" th:text="${notification.message}">Message</p>
                                        </div>
                                        <div class="text-secondary small text-end">
                                            <div>
                                                <span data-format="datetime"
                                                      th:attr="data-value=${#temporals.format(notification.createdAt, 'yyyy-MM-dd''T''HH:mm')}"></span>
                                            </div>
                                            <form class="mt-3" th:action="@{/animateur/notifications/{id}/restore(id=${notification.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button type="submit" class="btn btn-sm btn-outline-primary">Restaurer</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
