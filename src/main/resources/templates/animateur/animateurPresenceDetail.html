<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feuille de Présence — Animateur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="mm-page">
    <main class="mm-main">
        <div class="container py-4">
            <div class="mm-page-head">
                <div>
                    <span class="mm-page-eyebrow">Feuille de présence</span>
                    <h1 class="mm-page-title fs-1" th:text="${animation.activity.activyName}">Activité</h1>
                    <p class="mm-page-subtitle">
                        <span th:text="${#temporals.format(animation.startTime, 'EEEE d MMMM yyyy')}"></span>
                        <span> de </span>
                        <span th:text="${#temporals.format(animation.startTime, 'HH:mm')}"></span>
                        <span> à </span>
                        <span th:text="${#temporals.format(animation.endTime, 'HH:mm')}"></span>
                    </p>
                </div>
                <div class="mm-page-actions">
                    <a class="btn btn-outline-primary" href="/animateur/inscriptions">Retour au calendrier</a>
                </div>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <span th:text="${message}"></span>
            </div>

            <div id="animateurInscriptionsFeedback" class="alert d-none" role="alert"></div>

            <div class="card mm-card-shadow">
                <div class="card-body">
                    <div class="mb-3">
                        <h2 class="mm-panel-title">Enfants inscrits</h2>
                        <p class="mm-panel-subtitle">Indiquez présent ou absent et ajoutez une note si nécessaire.</p>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                            <tr>
                                <th>Enfant</th>
                                <th>Présence</th>
                                <th>Note</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(inscriptions)}">
                                <td colspan="3" class="text-secondary">Aucun enfant approuvé pour cette session.</td>
                            </tr>
                            <tr th:each="inscription : ${inscriptions}">
                                <td th:text="${inscription.enfant.prenom + ' ' + inscription.enfant.nom}"></td>
                                <td>
                                    <div class="js-animateur-presence-row d-flex gap-2 align-items-center"
                                         th:attr="data-inscription-id=${inscription.id},
                                                  data-redirect-to=@{'/animateur/animations/' + ${animation.id} + '/presence'},
                                                  data-csrf-name=${_csrf.parameterName},
                                                  data-csrf-token=${_csrf.token}">
                                        <select name="presenceStatus" class="form-select form-select-sm js-animateur-presence-status" required>
                                            <option th:each="s : ${presenceStatuses}"
                                                    th:value="${s}"
                                                    th:text="${T(CRM_Manara.CRM_Manara.Model.Entity.Service.UiLabelService).presenceStatus(s)}"
                                                    th:selected="${s == inscription.presenceStatus}"></option>
                                        </select>
                                    </div>
                                </td>
                                <td>
                                    <input type="text" name="incidentNote" class="form-control form-control-sm js-animateur-incident-note"
                                           th:value="${inscription.incidentNote}" placeholder="Note (optionnel)">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-end mt-3" th:if="${not #lists.isEmpty(inscriptions)}">
                        <button type="button" class="btn btn-primary js-animateur-save-all">
                            Enregistrer
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/animateur-inscriptions.js}"></script>
</body>
</html>
