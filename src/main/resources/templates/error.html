<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Erreur - CRM Manara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="mm-page">
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="mm-main">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    <div class="card mm-card-shadow border-0">
                        <div class="card-body p-4 p-lg-5 text-center">
                            <span class="mm-page-eyebrow">Erreur</span>
                            <div class="display-5 fw-semibold mt-2 mb-3" th:text="${errorStatus ?: 500}">500</div>
                            <h1 class="mm-page-title fs-2 mb-3" th:text="${errorTitle ?: 'Une erreur est survenue'}">Une erreur est survenue</h1>
                            <p class="mm-page-subtitle mb-4" th:text="${errorMessage ?: 'La page demandée est momentanément indisponible.'}">
                                La page demandée est momentanément indisponible.
                            </p>
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <a class="btn btn-primary" th:href="${currentUserHomeUrl}">Retour à l'accueil</a>
                                <a class="btn btn-outline-secondary" href="javascript:history.back()">Revenir à la page précédente</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
