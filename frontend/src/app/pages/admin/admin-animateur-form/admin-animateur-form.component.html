<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card mm-card-shadow mm-form-card">
        <div class="card-body p-4">
          <span class="mm-page-eyebrow">{{ isEdit ? 'Modification' : 'Nouvel animateur' }}</span>
          <h1 class="mm-page-title fs-2 mb-3">{{ isEdit ? 'Modifier un animateur' : 'Ajouter un animateur' }}</h1>

          <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>
          <div *ngIf="loading()" class="text-secondary py-4">{{ 'COMMON.LOADING' | translate }}</div>

          <form *ngIf="!loading()" (ngSubmit)="onSubmit()" #f="ngForm">
            <div class="mb-3">
              <label class="form-label">{{ 'COMMON.LAST_NAME' | translate }}</label>
              <input type="text" class="form-control" [(ngModel)]="nom" name="nom" required>
            </div>

            <div class="mb-3">
              <label class="form-label">{{ 'AUTO.PAGES.ADMIN.ADMIN_ANIMATEUR_FORM.ADMIN_ANIMATEUR_FORM.PRENOM' | translate }}</label>
              <input type="text" class="form-control" [(ngModel)]="prenom" name="prenom" required>
            </div>

            <div class="mb-3">
              <label class="form-label">{{ 'AUTO.PAGES.ADMIN.ADMIN_ANIMATEUR_FORM.ADMIN_ANIMATEUR_FORM.EMAIL' | translate }}</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" [disabled]="isEdit" [required]="!isEdit">
            </div>

            <div class="mb-3" *ngIf="!isEdit">
              <label class="form-label">{{ 'COMMON.PASSWORD' | translate }}</label>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" required minlength="6">
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn btn-primary" [disabled]="saving()">
                {{ saving() ? 'Enregistrement...' : (isEdit ? 'Enregistrer' : 'Creer') }}
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="cancel()">{{ 'AUTO.PAGES.ADMIN.ADMIN_ACTIVITY_FORM.ADMIN_ACTIVITY_FORM.ANNULER' | translate }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
