<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7">
      <div class="card mm-card-shadow mm-form-card">
        <div class="card-body p-4">
          <span class="mm-page-eyebrow">{{ isEdit ? 'Modification' : 'Nouvelle activite' }}</span>
          <h1 class="mm-page-title fs-2 mb-3">{{ isEdit ? 'Modifier une activite' : 'Creer une activite' }}</h1>

          <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>
          <div *ngIf="loading()" class="text-secondary py-4">Chargement...</div>

          <form *ngIf="!loading()" (ngSubmit)="onSubmit()" #f="ngForm">
            <div class="mb-3">
              <label class="form-label">Nom</label>
              <input type="text" class="form-control" [(ngModel)]="name" name="name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea rows="3" class="form-control" [(ngModel)]="description" name="description" required></textarea>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Age min</label>
                <input type="number" min="0" class="form-control" [(ngModel)]="ageMin" name="ageMin" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Age max</label>
                <input type="number" min="0" class="form-control" [(ngModel)]="ageMax" name="ageMax" required>
              </div>
            </div>

            <div class="mt-3">
              <label class="form-label">Capacite</label>
              <input type="number" min="1" class="form-control" [(ngModel)]="capacity" name="capacity" required>
            </div>

            <div class="row g-3 mt-1">
              <div class="col-md-6">
                <label class="form-label">Statut</label>
                <select class="form-select" [(ngModel)]="status" name="status" required>
                  <option *ngFor="let item of options()?.activityStatuses" [value]="item">{{ label(item) }}</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Type</label>
                <select class="form-select" [(ngModel)]="type" name="type" required>
                  <option *ngFor="let item of options()?.activityTypes" [value]="item">{{ label(item) }}</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-2 mt-4 flex-wrap">
              <button type="submit" class="btn btn-primary" [disabled]="saving()">
                {{ saving() ? 'Enregistrement...' : (isEdit ? 'Enregistrer' : 'Creer') }}
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Annuler</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
