<div class="container py-4">
  <div class="mm-page-head">
    <div>
      <span class="mm-page-eyebrow">Notifications</span>
      <h1 class="mm-page-title fs-1">Mes notifications</h1>
      <p class="mm-page-subtitle">Messages et alertes concernant vos inscriptions.</p>
    </div>
  </div>

  <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>
  <div *ngIf="loading()" class="text-secondary py-4">Chargement...</div>

  <div *ngIf="!loading()" class="card mm-card-shadow">
    <div class="card-body">
      <div *ngIf="!notifications().length" class="text-secondary">Aucune notification.</div>
      <div class="vstack gap-2">
        <div *ngFor="let n of notifications()"
          class="border rounded-3 p-3"
          [class.border-primary]="!n.readStatus">
          <div class="d-flex justify-content-between gap-3 flex-wrap">
            <div>
              <div class="mm-page-eyebrow mb-1">
                {{ n.category }}
                <span *ngIf="!n.readStatus" class="badge bg-primary ms-2">Nouveau</span>
              </div>
              <div class="fw-semibold">{{ n.title }}</div>
              <div class="text-secondary small mt-1">{{ n.message }}</div>
            </div>
            <div class="text-secondary small">{{ n.createdAt | date:'dd/MM/yyyy HH:mm' }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
