<div class="container py-4">
  <div class="mm-page-head">
    <div>
      <span class="mm-page-eyebrow">Historique</span>
      <h1 class="mm-page-title fs-1">Quiz generes</h1>
      <p class="mm-page-subtitle">Retrouvez les quiz deja crees et filtrez par date.</p>
    </div>
    <div class="mm-page-actions">
      <button class="btn btn-outline-primary" type="button" [disabled]="backfilling()" (click)="backfillHomeworks()">
        {{ backfilling() ? 'Regeneration...' : 'Regenerer les devoirs manquants' }}
      </button>
      <a class="btn btn-primary" routerLink="/animateur/quizzes">Creer un quiz</a>
    </div>
  </div>

  <div *ngIf="success()" class="alert alert-success">{{ success() }}</div>
  <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>
  <div *ngIf="loading()" class="text-secondary py-4">Chargement...</div>

  <app-list-page
    *ngIf="!loading()"
    [items]="visibleQuizzes()"
    [searchLabel]="'Recherche'"
    [searchPlaceholder]="'Titre ou activite'"
    [searchValue]="search()"
    [resultLabel]="filteredQuizzes().length + ' resultat(s)'"
    [emptyColspan]="5"
    [emptyMessage]="'Aucun quiz ne correspond aux filtres.'"
    [page]="page()"
    [totalPages]="totalPages()"
    [totalItems]="filteredQuizzes().length"
    [pageSize]="pageSize"
    (searchChange)="setSearch($event)"
    (previous)="previousPage()"
    (next)="nextPage()">
    <ng-template appListFilters>
      <div class="col-12 col-md-6 col-lg-3">
        <label class="form-label">A partir du</label>
        <input #fromInput type="date" class="form-control" [value]="fromDate()" (input)="setFromDate(fromInput.value)" />
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <label class="form-label">Jusqu'au</label>
        <input #toInput type="date" class="form-control" [value]="toDate()" (input)="setToDate(toInput.value)" />
      </div>
    </ng-template>
    <ng-template appListHead>
      <th>Titre</th>
      <th>Activite</th>
      <th>Date</th>
      <th>Axes</th>
      <th>Actions</th>
    </ng-template>
    <ng-template appListRow let-quiz>
      <td>{{ quiz.title }}</td>
      <td>{{ quiz.activityName || '-' }}</td>
      <td>{{ quiz.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
      <td>{{ quiz.axes.length }}</td>
      <td>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-sm btn-outline-primary" (click)="openDetail(quiz.id)">Details</button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteQuiz(quiz)">Supprimer</button>
        </div>
      </td>
    </ng-template>
  </app-list-page>
</div>
